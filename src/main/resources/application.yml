spring:
  application:
    name: nano-job
  datasource:
    url: jdbc:sqlite:nano-job.db?busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      repositories:
        enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

nano-job:
  scheduler:
    poll-interval: 1s
    batch-size: 100
    capacity-aware-dispatch: true
  execution:
    pool-size: 4
    queue-capacity: 100
    retry-delay: 30s
    lease-duration: 30s
    lease-heartbeat-interval: 10s
    worker-id: local-worker
  dedup:
    mode: RETURN_EXISTING
    detect-drift: true
    window: 0s
  http:
    connect-timeout: 2s
    default-timeout: 2s
  outbox:
    batch-size: 100
    retry-delay: 250ms
  transport:
    type: LOCAL
    redis:
      stream-key: nano-job:dispatch
      consumer-group: nano-job-workers
      consumer-name: nano-job-local
      block-timeout: 1s
